<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Sistema Inventario</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161923; --border: #1e2535;
      --accent: #00e5a0; --accent2: #0094ff;
      --danger: #ff4d6d; --text: #e8ecf4; --muted: #5a6480; --card: #1a1f2e;
    }
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,229,160,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; bottom: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,148,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 2.5rem 2.25rem;
      width: 100%; max-width: 400px;
      position: relative; z-index: 1;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .brand h1 { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.03em; }
    .brand span { color: var(--accent); }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1.75rem;
    }

    .form-group { margin-bottom: 1.1rem; }
    .form-group label {
      display: block;
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,0.1);
    }

    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 9px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.18s, transform 0.18s, box-shadow 0.18s;
    }
    .btn-login:hover {
      background: #00ffb3;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,229,160,0.3);
    }

    .error-msg {
      background: rgba(255,77,109,0.12);
      border: 1px solid rgba(255,77,109,0.3);
      color: var(--danger);
      border-radius: 8px;
      padding: 0.6rem 0.875rem;
      font-size: 0.82rem;
      font-family: 'DM Mono', monospace;
      margin-top: 0.875rem;
      display: none;
    }

    .usuarios-hint {
      margin-top: 1.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1.25rem;
    }
    .usuarios-hint p {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }
    .user-chip {
      display: flex; align-items: center; gap: 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.875rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: border-color 0.18s;
      font-size: 0.85rem;
    }
    .user-chip:hover { border-color: var(--accent); }
    .user-chip .tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      margin-left: auto;
    }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
    }
    .footer-note span { color: var(--accent); }
  </style>
</head>
<body>

<div class="login-box">
  <div class="brand">
    <div class="brand-icon">📦</div>
    <h1>Sistema<span>Inventario</span></h1>
  </div>
  <div class="subtitle">// Acceso al sistema</div>

  <div class="form-group">
    <label>Usuario</label>
    <input type="text" id="usuario" placeholder="Ingresa tu usuario"/>
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()"/>
  </div>

  <button class="btn-login" onclick="login()">Ingresar →</button>
  <div class="error-msg" id="error">❌ Usuario o contraseña incorrectos</div>

  <div class="usuarios-hint">
    <p>Usuarios disponibles — clic para autocompletar</p>
    <div class="user-chip" onclick="fill('toñito','1234')">
      🧑 <strong>Toñito</strong>
      <span class="tag">Administrador</span>
    </div>
    <div class="user-chip" onclick="fill('gordo','1234')">
      👤 <strong>Gordo</strong>
      <span class="tag">Colaborador</span>
    </div>
  </div>

  <div class="footer-note">
    Proyecto colaborativo · <span>GitHub</span>
  </div>
</div>

<script>
  const usuarios = {
    'toñito': { pass: '1234', nombre: 'Toñito', rol: 'Administrador' },
    'gordo':  { pass: '1234', nombre: 'Gordo',  rol: 'Colaborador'   }
  };

  function fill(user, pass) {
    document.getElementById('usuario').value  = user;
    document.getElementById('password').value = pass;
  }

  function login() {
    const user = document.getElementById('usuario').value.toLowerCase().trim();
    const pass = document.getElementById('password').value;
    const err  = document.getElementById('error');

    if (usuarios[user] && usuarios[user].pass === pass) {
      sessionStorage.setItem('usuario', JSON.stringify(usuarios[user]));
      window.location.href = 'inventario.html';
    } else {
      err.style.display = 'block';
      setTimeout(() => err.style.display = 'none', 3000);
    }
  }
</script>
</body>
</html>
